services:
  catalogdb:
    container_name: catalogdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=CatalogDb
    restart: always
    ports:
        - "5432:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data

  identitydb:
    container_name: identitydb
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Your_password123
    restart: always
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_identity:/var/opt/mssql

  identity.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Server=identitydb,1433;Database=IdentityDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=True;Connect Timeout=5
      - Jwt__Issuer=EShop.Identity
      - Jwt__Audience=EShop.Services
      - Jwt__Secret=CHANGE_ME_DEV_SECRET_1234567890_32_CHARS_MIN
      - Seq__ServerUrl=http://seq:80
      - DataProtection__KeysPath=/home/app/.aspnet/DataProtection-Keys
    depends_on:
      - identitydb
    ports:
      - "6003:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - identity_dataprotection_keys:/home/app/.aspnet/DataProtection-Keys
  
  catalog.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Server=catalogdb;Port=5432;Database=CatalogDb;User Id=postgres;Password=postgres;Include Error Detail=true
      - Jwt__Issuer=EShop.Identity
      - Jwt__Audience=EShop.Services
      - Jwt__Secret=CHANGE_ME_DEV_SECRET_1234567890_32_CHARS_MIN
      - Jwt__ClockSkewSeconds=30
      - Seq__ServerUrl=http://seq:80
      - DataProtection__KeysPath=/home/app/.aspnet/DataProtection-Keys
    depends_on:
      - catalogdb
      - seq
    ports:
      - "6000:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - catalog_dataprotection_keys:/home/app/.aspnet/DataProtection-Keys
  basketdb:
    container_name: basketdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=BasketDb
    restart: always
    ports:
        - "55433:5432"
    volumes:
      - postgres_basket:/var/lib/postgresql/data
  distributedcache:
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"
  seq:
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    restart: always
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
  

  basket.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Server=basketdb;Port=5432;Database=BasketDb;User Id=postgres;Password=postgres;Include Error Detail=true
      - ConnectionStrings__Redis=distributedcache:6379
      - GrpcSettings__DiscountUrl=http://discount.grpc:8080
      - InternalServiceAuth__ServiceName=Basket.API
      - InternalServiceAuth__Scopes__0=discount.read
      - InternalServiceAuth__TokenLifetimeMinutes=5
      - Jwt__Issuer=EShop.Identity
      - Jwt__Audience=EShop.Services
      - Jwt__Secret=CHANGE_ME_DEV_SECRET_1234567890_32_CHARS_MIN
      - Jwt__ClockSkewSeconds=30
      - MessageBroker__Host=amqp://ecommerce-mq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MessageBroker__UseSsl=false
      - Seq__ServerUrl=http://seq:80
      - DataProtection__KeysPath=/home/app/.aspnet/DataProtection-Keys

    depends_on:
      - basketdb
      - distributedcache
      - discount.grpc
      - messagebroker
      - seq
    ports:
      - "6001:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - basket_dataprotection_keys:/home/app/.aspnet/DataProtection-Keys
  
  orderdb:
    container_name: orderdb
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SwN12345678
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_order:/var/opt/mssql

  messagebroker:
    container_name: messagebroker
    hostname: ecommerce-mq
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
  
  discount.grpc:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Data Source=discountdb
      - Jwt__Issuer=EShop.Identity
      - Jwt__Audience=EShop.Services
      - Jwt__Secret=CHANGE_ME_DEV_SECRET_1234567890_32_CHARS_MIN
      - Jwt__ClockSkewSeconds=30
      - Seq__ServerUrl=http://seq:80
      - DataProtection__KeysPath=/home/app/.aspnet/DataProtection-Keys
    depends_on:
      - seq
    ports:
      - "6002:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - discount_dataprotection_keys:/home/app/.aspnet/DataProtection-Keys
  
  ordering.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Database=Server=orderdb;Database=OrderDb;User Id=sa;Password=SwN12345678;Encrypt=False;TrustServerCertificate=True
      - MessageBroker__Host=amqp://ecommerce-mq:5672
      - MessageBroker__UserName=guest
      - MessageBroker__Password=guest
      - MessageBroker__UseSsl=false
      - Jwt__Issuer=EShop.Identity
      - Jwt__Audience=EShop.Services
      - Jwt__Secret=CHANGE_ME_DEV_SECRET_1234567890_32_CHARS_MIN
      - Jwt__ClockSkewSeconds=30
      - FeatureManagement__OrderFullfilment=false
    depends_on:
      - orderdb
      - messagebroker
    ports:
      - "6004:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro

  yarpapigateway:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - Seq__ServerUrl=http://seq:80
      - Jwt__Issuer=EShop.Identity
      - Jwt__Audience=EShop.Services
      - Jwt__Secret=CHANGE_ME_DEV_SECRET_1234567890_32_CHARS_MIN
      - Jwt__ClockSkewSeconds=30
      - ReverseProxy__Clusters__catalog__Destinations__catalogApi__Address=http://catalog.api:8080/
      - ReverseProxy__Clusters__basket__Destinations__basketApi__Address=http://basket.api:8080/
      - ReverseProxy__Clusters__identity__Destinations__identityApi__Address=http://identity.api:8080/
      - ReverseProxy__Clusters__ordering__Destinations__orderingApi__Address=http://ordering.api:8080/
    depends_on:
      - catalog.api
      - basket.api
      - identity.api
      - ordering.api
      - seq
    ports:
      - "6005:8080"
